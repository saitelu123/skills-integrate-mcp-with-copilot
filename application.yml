# Spring Boot Configuration - Couchbase Certificate-Only Connection
# Certificate-based authentication with mutual TLS

couchbase:
  # Connection string using couchbases:// for TLS
  host: couchbases://your-cluster.example.com:11207
  
  # Certificate paths (PEM format)
  cert:
    # Client certificate for mutual TLS authentication
    path: ${COUCHBASE_CERT_PATH:/etc/couchbase/certs/tls.cert}
  
  key:
    # Client private key (unencrypted)
    path: ${COUCHBASE_KEY_PATH:/etc/couchbase/certs/tls.key}
  
  ca-cert:
    # Certificate Authority certificate for server validation
    path: ${COUCHBASE_CA_CERT_PATH:/etc/couchbase/certs/ca.cert}

# Spring Data Couchbase
spring:
  couchbase:
    connection-string: ${couchbase.host}
    
    env:
      ssl:
        enabled: true
      
      timeouts:
        connect: 10s
        disconnect: 10s
        key-value: 2500ms
        management: 75s
